name: Bug report
description: Report a defect discovered during ticket development or QA gate.
title: "[Bug]: "
labels:
  - bug
  - needs-triage
body:
  - type: input
    id: ticket
    attributes:
      label: Related Jira ticket
      description: Enter key like CCF-123.
      placeholder: CCF-123
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: Bug summary
      description: Describe the bug in one or two sentences.
      placeholder: What is broken?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Provide exact steps and test data.
      placeholder: |
        1. Open ...
        2. Click ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected result
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual result
    validations:
      required: true

  - type: textarea
    id: evidence
    attributes:
      label: Logs, screenshots, or failing checks
      description: Include workflow URL, console output, or screenshots.

  - type: checkboxes
    id: done-definition
    attributes:
      label: Verification checklist
      options:
        - label: Regression test added or updated
        - label: `pnpm qa:gate` passes locally
        - label: Fix verified by another person or on staging