name: Ticket Quality Gate

on:
  pull_request:
    branches:
      - main
      - staging

permissions:
  contents: read
  pull-requests: read

jobs:
  qa_gate:
    name: Validate Ticket Changes
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Ensure Jira ticket key is linked
        id: ticket
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          BRANCH_NAME: ${{ github.head_ref }}
        run: |
          TEXT="$PR_TITLE $PR_BODY $BRANCH_NAME"
          MATCH=$(echo "$TEXT" | grep -Eo 'CCF-[0-9]+' | head -n1 || true)
          if [ -n "$MATCH" ]; then
            TICKET_KEY=$(echo "$MATCH" | tr '[:lower:]' '[:upper:]')
            TICKET_KEY_LOWER=$(echo "$TICKET_KEY" | tr '[:upper:]' '[:lower:]')
            echo "key=$TICKET_KEY" >> "$GITHUB_OUTPUT"
            echo "key_lower=$TICKET_KEY_LOWER" >> "$GITHUB_OUTPUT"
            echo "Jira ticket key found: $TICKET_KEY"
          else
            echo "Missing Jira ticket key (expected format: CCF-123 in PR title/body/branch)."
            exit 1
          fi

      - name: Run unit + integration tests
        run: pnpm test:unit

      - name: Run ticket-specific verification
        run: pnpm -s verify:ticket "${{ steps.ticket.outputs.key }}"

      - name: Run QA gate
        run: pnpm qa:gate

  e2e:
    name: E2E Tests (Public Flows)
    runs-on: ubuntu-latest
    needs: qa_gate
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      PLAYWRIGHT_BASE_URL: ${{ secrets.PLAYWRIGHT_BASE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install chromium --with-deps

      - name: Run E2E tests
        run: pnpm test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  file_bug_on_failure:
    name: Auto-file Bug From Failed QA
    if: ${{ always() && (needs.qa_gate.result == 'failure' || needs.e2e.result == 'failure') }}
    needs:
      - qa_gate
      - e2e
    runs-on: ubuntu-latest
    steps:
      - name: Extract ticket key from PR
        id: ticket
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          BRANCH_NAME: ${{ github.head_ref }}
        run: |
          TEXT="$PR_TITLE $PR_BODY $BRANCH_NAME"
          MATCH=$(echo "$TEXT" | grep -Eo 'CCF-[0-9]+' | head -n1 || true)
          if [ -n "$MATCH" ]; then
            echo "key=$(echo "$MATCH" | tr '[:lower:]' '[:upper:]')" >> "$GITHUB_OUTPUT"
          else
            echo "key=CCF-UNKNOWN" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Jira bug from failure
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_BUG_PROJECT_KEY: ${{ secrets.JIRA_BUG_PROJECT_KEY }}
          TICKET_KEY: ${{ steps.ticket.outputs.key }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          COMMIT_SHA: ${{ github.event.pull_request.head.sha }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "$JIRA_BASE_URL" ] || [ -z "$JIRA_EMAIL" ] || [ -z "$JIRA_API_TOKEN" ] || [ -z "$JIRA_BUG_PROJECT_KEY" ]; then
            echo "Jira credentials are not fully configured; skipping Jira bug creation."
            exit 0
          fi

          SUMMARY="[QA Failure] $TICKET_KEY - PR #$PR_NUMBER"

          PAYLOAD=$(jq -n \
            --arg project "$JIRA_BUG_PROJECT_KEY" \
            --arg summary "$SUMMARY" \
            --arg ticket "$TICKET_KEY" \
            --arg prTitle "$PR_TITLE" \
            --arg prUrl "$PR_URL" \
            --arg runUrl "$RUN_URL" \
            --arg commit "$COMMIT_SHA" \
            '{
              fields: {
                project: { key: $project },
                summary: $summary,
                issuetype: { name: "Bug" },
                labels: ["auto-filed", "qa-failure"],
                description: {
                  type: "doc",
                  version: 1,
                  content: [
                    {
                      type: "paragraph",
                      content: [{ type: "text", text: ("Source ticket: " + $ticket) }]
                    },
                    {
                      type: "paragraph",
                      content: [{ type: "text", text: ("PR: " + $prTitle) }]
                    },
                    {
                      type: "paragraph",
                      content: [{ type: "text", text: ("PR URL: " + $prUrl) }]
                    },
                    {
                      type: "paragraph",
                      content: [{ type: "text", text: ("Workflow run: " + $runUrl) }]
                    },
                    {
                      type: "paragraph",
                      content: [{ type: "text", text: ("Commit: " + $commit) }]
                    }
                  ]
                }
              }
            }')

          RESPONSE=$(curl -sS -X POST \
            -u "$JIRA_EMAIL:$JIRA_API_TOKEN" \
            -H "Accept: application/json" \
            -H "Content-Type: application/json" \
            --data "$PAYLOAD" \
            "$JIRA_BASE_URL/rest/api/3/issue")

          CREATED_KEY=$(echo "$RESPONSE" | jq -r '.key // empty')
          if [ -n "$CREATED_KEY" ]; then
            echo "Created Jira bug: $CREATED_KEY"
          else
            echo "Failed to create Jira bug. Response: $RESPONSE"
            exit 1
          fi